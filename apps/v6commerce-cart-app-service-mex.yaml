# ArgoCD Application: v6commerce-cart-app-service-mex
# Deployed by backstage-onboarded app-of-apps (watches apps/ directory).
# Namespace created automatically via CreateNamespace=true.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: v6commerce-cart-app-service-mex
  namespace: argocd
  labels:
    service: v6commerce-cart-app-service
    market: mex
    managed-by: backstage-scaffolder
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/priyankaajbhagatt-collab/argocd-apps.git
    targetRevision: HEAD
    path: services/v6commerce-cart-app-service/overlays/mex
  destination:
    server: https://kubernetes.default.svc
    namespace: v6commerce-cart-app-service-mex
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
