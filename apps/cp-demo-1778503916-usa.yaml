apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cp-demo-1778503916-usa
  namespace: argocd
  labels:
    service: cp-demo-1778503916
    market: usa
    group: devex-scaffolder
    managed-by: backstage-scaffolder
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/priyankaajbhagatt-collab/cp-demo-1778503916.git
    targetRevision: main
    path: deploy/overlays/usa

  destination:
    server: https://kubernetes.default.svc
    namespace: cp-demo-1778503916-usa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
