# ArgoCD Applications for v7-commerce-cart-app-service — one per market.
#
# Generated at scaffold time. This file is opened as a PR against the GitOps
# repo (priyankaajbhagatt-collab/argocd-apps) — the parent ApplicationSet in ArgoCD watches
# that path and creates child Applications on merge.
#
# Each application deploys to namespace `{service}-{market}` on the cluster.
# CreateNamespace=true means ArgoCD creates the namespace on first sync.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: v7-commerce-cart-app-service-mys
  namespace: argocd
  labels:
    service: v7-commerce-cart-app-service
    product: commerce-cart
    market: mys
    managed-by: backstage-scaffolder
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/priyankaajbhagatt-collab/argocd-apps.git
    targetRevision: HEAD
    path: services/v7-commerce-cart-app-service/overlays/mys
  destination:
    server: https://kubernetes.default.svc
    namespace: v7-commerce-cart-app-service-mys
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
