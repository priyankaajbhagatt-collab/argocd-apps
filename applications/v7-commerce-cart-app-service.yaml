# ArgoCD Applications for v7-commerce-cart-app-service — one per env × region.
#
# Generated at scaffold time. This file is opened as a PR against the GitOps
# repo (priyankaajbhagatt-collab/argocd-apps) — the parent ApplicationSet in ArgoCD watches
# that path and creates child Applications on merge.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: v7-commerce-cart-app-service-dev-us-east-1
  namespace: argocd
  labels:
    service: v7-commerce-cart-app-service
    product: commerce-cart
    env: dev
    region: us-east-1
    managed-by: backstage-scaffolder
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/priyankaajbhagatt-collab/argocd-apps.git
    targetRevision: HEAD
    path: services/v7-commerce-cart-app-service/overlays/dev-us-east-1
  destination:
    server: https://kubernetes.default.svc
    namespace: v7-commerce-cart-app-service-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
---
