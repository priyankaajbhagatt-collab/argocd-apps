apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ommerce-my-new-service-dev
resources:
  - ../../base
commonLabels:
  env: dev
  region: us-east-1
# The deploy stage of the CodePipeline runs:
#   argocd app set ommerce-my-new-service-dev-us-east-1 --kustomize-image ommerce-my-new-service=<ecr-uri>:<sha>
# which rewrites this block at deploy time.
images:
  - name: public.ecr.aws/docker/library/nginx
    newName: public.ecr.aws/docker/library/nginx
    newTag: alpine
